<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Riddhi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--white); box-shadow: 2px 0 10px rgba(0,0,0,0.05); padding: 30px 20px; }
        .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 40px; text-align: center; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 15px; }
        .sidebar-menu a { display: block; padding: 12px 20px; border-radius: 8px; color: var(--text-dark); transition: var(--transition); }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: var(--primary-light); color: var(--primary-color); }
        .sidebar-menu a i { margin-right: 10px; width: 20px; text-align: center; }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; }
        
        .card { background: var(--white); border-radius: var(--border-radius); padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .card h3 { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { font-weight: 600; color: var(--text-light); }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 1.1rem; margin-right: 10px; transition: var(--transition); }
        .action-btn:hover { color: var(--primary-color); }
        .delete-btn:hover { color: #dc3545; }
        
        .unread { font-weight: bold; background-color: rgba(247, 122, 136, 0.05); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="sidebar-logo">RIDDHI ADMIN</div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active" id="nav-messages"><i class="fa-regular fa-envelope"></i> Messages</a></li>
                <li><a href="#" id="nav-collabs"><i class="fa-solid fa-link"></i> Collaborations</a></li>
                <li><a href="#" id="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1 id="page-title">Contact Messages</h1>
                <p>Welcome back, Admin</p>
            </div>
            
            <div id="messages-section" class="card">
                <h3>Recent Inquiries</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="messages-body">
                        <!-- Messages loaded dynamically -->
                    </tbody>
                </table>
            </div>

            <div id="collabs-section" class="card" style="display: none;">
                <h3>Add New Collaboration</h3>
                <form id="addCollabForm" enctype="multipart/form-data" style="margin-bottom: 40px;">
                    <div class="form-group">
                        <label>Brand Name</label>
                        <input type="text" id="brandName" required>
                    </div>
                    <div class="form-group">
                        <label>Brand Logo / Image</label>
                        <input type="file" id="brandImage" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn primary-btn">Add Collaboration</button>
                </form>
                
                <h3>Existing Collaborations</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Brand Name</th>
                            <th>Date Added</th>
                        </tr>
                    </thead>
                    <tbody id="collabs-body">
                        <!-- Collabs loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/login';

        const apiHeaders = { 'Authorization': `Bearer ${token}` };

        // Navigation
        document.getElementById('nav-messages').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('messages-section').style.display = 'block';
            document.getElementById('collabs-section').style.display = 'none';
            document.getElementById('page-title').innerText = 'Contact Messages';
            loadMessages();
        });

        document.getElementById('nav-collabs').addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('messages-section').style.display = 'none';
            document.getElementById('collabs-section').style.display = 'block';
            document.getElementById('page-title').innerText = 'Brand Collaborations';
            loadCollabs();
        });

        document.getElementById('logout').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('adminToken');
            window.location.href = '/login';
        });

        // Load Messages
        async function loadMessages() {
            try {
                const res = await fetch('/api/messages', { headers: apiHeaders });
                const messages = await res.json();
                const tbody = document.getElementById('messages-body');
                tbody.innerHTML = '';
                
                messages.forEach(msg => {
                    const tr = document.createElement('tr');
                    if (!msg.read) tr.classList.add('unread');
                    
                    tr.innerHTML = `
                        <td>${msg.name}</td>
                        <td><a href="mailto:${msg.email}">${msg.email}</a></td>
                        <td>${msg.message.substring(0, 50)}...</td>
                        <td>${new Date(msg.createdAt).toLocaleDateString()}</td>
                        <td>
                            ${!msg.read ? `<button class="action-btn" onclick="markRead('${msg._id}')" title="Mark as Read"><i class="fa-solid fa-check"></i></button>` : ''}
                            <button class="action-btn delete-btn" onclick="deleteMessage('${msg._id}')" title="Delete"><i class="fa-regular fa-trash-can"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        async function markRead(id) {
            await fetch(`/api/message/${id}/read`, { method: 'PUT', headers: apiHeaders });
            loadMessages();
        }

        async function deleteMessage(id) {
            if(confirm('Are you sure you want to delete this message?')) {
                await fetch(`/api/message/${id}`, { method: 'DELETE', headers: apiHeaders });
                loadMessages();
            }
        }

        // Load Collabs
        async function loadCollabs() {
            try {
                const res = await fetch('/api/collabs');
                const collabs = await res.json();
                const tbody = document.getElementById('collabs-body');
                tbody.innerHTML = '';
                
                collabs.forEach(collab => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><img src="${collab.imageUrl}" alt="${collab.brandName}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;"></td>
                        <td>${collab.brandName}</td>
                        <td>${new Date(collab.createdAt).toLocaleDateString()}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        // Add Collab
        document.getElementById('addCollabForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('brandName', document.getElementById('brandName').value);
            formData.append('image', document.getElementById('brandImage').files[0]);

            try {
                await fetch('/api/collab', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                document.getElementById('addCollabForm').reset();
                loadCollabs();
            } catch (err) { console.error(err); }
        });

        // Init
        loadMessages();
    </script>
</body>
</html>
